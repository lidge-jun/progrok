<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>progrok — Grok Chat</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h2>Sessions</h2>
        <button id="new-chat-btn" title="New chat">+</button>
      </div>
      <div id="session-list" class="session-list"></div>
    </aside>

    <div class="main">
      <header>
        <button id="sidebar-toggle" class="hamburger" title="Toggle sidebar">&#9776;</button>
        <h1>progrok</h1>
        <div class="controls">
          <select id="model-select"></select>
        </div>
      </header>

      <main id="messages"></main>

      <div id="spinner" class="spinner-wrap hidden">
        <div class="spinner"></div>
      </div>

      <footer>
        <form id="chat-form">
          <textarea id="input" placeholder="Message Grok..." rows="1" autofocus></textarea>
          <button type="submit" id="send-btn">&rarr;</button>
        </form>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
